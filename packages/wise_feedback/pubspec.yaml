name: wise_feedback
description: In-app bug reporting for Flutter that files a screenshot, title and description as a Linear issue, via a pluggable transport (direct token or backend proxy).
version: 0.5.0
homepage: https://github.com/wisemen-digital/wisemen-flutter-packages/tree/main/packages/wise_feedback
repository: https://github.com/wisemen-digital/wisemen-flutter-packages/tree/main/packages/wise_feedback

environment:
  sdk: ">=3.6.0 <4.0.0"
resolution: workspace

dependencies:
  # Flutter
  flutter:
    sdk: flutter
  # Screenshot capture + feedback overlay
  feedback: ">=3.2.0 <4.0.0"
  # Transport HTTP + GraphQL-over-HTTP
  http: ">=1.2.0 <2.0.0"
  # Automatic report metadata
  device_info_plus: ">=11.0.0 <14.0.0"
  package_info_plus: ">=8.0.0 <11.0.0"
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  # Static analysis & linting
  flutter_lints: ^6.0.0
  # Testing
  flutter_test:
    sdk: flutter
  intl_utils: ^2.8.14

flutter_intl:
  enabled: true
  class_name: WiseFeedbackLocalizations
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/generated
