name: wisewidgetslibrary
description: Wisemen widgets library containing platform specific widgets and other commonly useful widgets.
version: 2.1.5
homepage: https://github.com/wisemen-digital/wisemen-flutter-packages/packages/wisewidgetslibrary
repository: https://github.com/wisemen-digital/flutter-widgets-library/packages/wisewidgetslibrary

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.41.0"
resolution: workspace
dependencies:
  # Flutter
  flutter:
    sdk: flutter
  intl: ">=0.20.2 <1.0.0"

  # Images
  cached_network_image: ">=3.4.1 <4.0.0"
  photo_view: ">=0.15.0 <1.0.0"

  # UI
  auto_size_text: ">=3.0.0 <4.0.0"
  pull_down_button: ">=0.10.2 <1.0.0"
  sliver_tools: ">=0.2.12 <1.0.0"
  shimmer: ">=3.0.0 <4.0.0"
  easy_infinite_pagination: ">=0.0.6 <1.0.0"
    
  # Animations
  page_transition: ">=2.2.1 <3.0.0"
  flutter_animate: ">=4.5.2 <5.0.0"

  # Conditional wrap
  conditional_wrap: ">=3.0.0 <4.0.0"

  # Image carousel
  dismissible_page: ">=1.0.2 <2.0.0"

dev_dependencies:
  # Static analysis & linting
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.1
  dependency_validator: ^5.0.5
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  fake_async: ^1.3.3

flutter:
  uses-material-design: true
  plugin:
    platforms:
      ios:
        pluginClass: WiseWidgetsLibraryPlugin
